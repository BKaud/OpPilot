name: Deploy to Atspace via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Replace database credentials for production
        run: |
          # Replace database configuration in DBfiles/db_config.php
          sed -i "s/define('DB_HOST', 'localhost');/define('DB_HOST', '${{ secrets.SERVER_HOST }}');/" DBfiles/db_config.php
          sed -i "s/define('DB_PORT', '3306');/define('DB_PORT', '3306');/" DBfiles/db_config.php
          sed -i "s/define('DB_USER', 'root');/define('DB_USER', '${{ secrets.SERVER_USER }}');/" DBfiles/db_config.php
          sed -i "s/define('DB_PASS', 'password');/define('DB_PASS', '${{ secrets.SERVER_PASS }}');/" DBfiles/db_config.php
          
          # Verify the changes (for debugging)
          echo "=== Modified db_config.php ==="
          grep -E "DB_HOST|DB_PORT|DB_USER|DB_PASS" DBfiles/db_config.php

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21       
          security: strict
          protocol: ftp    
          local-dir: ./
          server-dir: oppilot.org/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**