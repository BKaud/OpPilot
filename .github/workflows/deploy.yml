name: Deploy to Bitnami via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/bitnami/apache/htdocs/"
            REPO_URL="https://github.com/BKaud/OPilot.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository found. Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git fetch --all
              git reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              mkdir -p "$DEPLOY_DIR"
              git clone --branch main "$REPO_URL" "$DEPLOY_DIR"
            fi

            # Update database configuration with production credentials
            echo "Updating database configuration..."
            sed -i "s/define('DB_HOST', 'localhost');/define('DB_HOST', '${{ secrets.SERVER_HOST }}');/" "$DEPLOY_DIR/DBfiles/db_config.php"
            sed -i "s/define('DB_PORT', '3306');/define('DB_PORT', '3306');/" "$DEPLOY_DIR/DBfiles/db_config.php"
            sed -i "s/define('DB_USER', 'root');/define('DB_USER', '${{ secrets.SERVER_USER }}');/" "$DEPLOY_DIR/DBfiles/db_config.php"
            sed -i "s/define('DB_PASS', 'password');/define('DB_PASS', '${{ secrets.SERVER_PASS }}');/" "$DEPLOY_DIR/DBfiles/db_config.php"
            sed -i "s/define('DB_NAME', 'oppilot');/define('DB_NAME', '${{ secrets.SERVER_DB_NAME }}');/" "$DEPLOY_DIR/DBfiles/db_config.php"

            echo "Database configuration updated successfully."
            echo "Deployment complete."