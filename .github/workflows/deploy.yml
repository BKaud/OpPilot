name: Deploy to Bitnami via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/bitnami/apache/htdocs/OPilot"
            REPO_URL="https://github.com/BKaud/OPilot.git"

            # Note: production database credentials (DB_HOST, DB_USER, DB_PASS, DB_NAME)
            # must be configured directly on the server in DBfiles/db_config.php and are
            # not overwritten by this workflow. Update them manually on first deployment.

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository found. Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git fetch --all
              git reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              mkdir -p "$DEPLOY_DIR"
              git clone --branch main "$REPO_URL" "$DEPLOY_DIR"
            fi

            echo "Deployment complete."