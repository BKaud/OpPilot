name: Deploy to Bitnami via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      BASE_PATH: ${{ secrets.BASE_PATH }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASS: ${{ secrets.SERVER_PASS }}
      SERVER_DB_NAME: ${{ secrets.SERVER_DB_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/bitnami/apache/htdocs/OPilot"
            REPO_URL="https://github.com/BKaud/OPilot.git"

            # Clone or update repository
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository found. Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git fetch --all
              git reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              mkdir -p "$DEPLOY_DIR"
              git clone --branch main "$REPO_URL" "$DEPLOY_DIR"
            fi

            # Ensure DBfiles dir exists
            mkdir -p "$DEPLOY_DIR/DBfiles"

            # Write app_config.php using printf (avoids embedding <?php in heredoc)
            printf '%s\n' "<?php" \
              "// auto-generated by deploy pipeline" \
              "define('BASE_PATH', '${BASE_PATH}');" \
              "define('DB_HOST', '${SERVER_HOST}');" \
              "define('DB_PORT', 3306);" \
              "define('DB_USER', '${SERVER_USER}');" \
              "define('DB_PASS', '${SERVER_PASS}');" \
              "define('DB_NAME', '${SERVER_DB_NAME}');" \
              > "$DEPLOY_DIR/DBfiles/app_config.php"

            # Restrict permissions (best-effort)
            chmod 640 "$DEPLOY_DIR/DBfiles/app_config.php" || true

            echo "Wrote DBfiles/app_config.php"
            echo "Deployment complete."