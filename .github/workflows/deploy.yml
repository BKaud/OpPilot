name: Deploy to Bitnami via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/bitnami/apache/htdocs"
            REPO_URL="https://github.com/BKaud/OPilot.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository found. Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git fetch --all
              git reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              mkdir -p "$DEPLOY_DIR"
              git clone --branch main "$REPO_URL" "$DEPLOY_DIR"
            fi

            # Generate app_config.php (loaded by DBfiles/db_config.php)
            echo "Writing production app_config.php..."
            mkdir -p "$DEPLOY_DIR/DBfiles"
            cat > "$DEPLOY_DIR/DBfiles/app_config.php" << 'PHPEOF'
            <?php
            define('BASE_PATH', '');
            define('DB_HOST', 'DB_HOST_PLACEHOLDER');
            define('DB_PORT', 3306);
            define('DB_USER', 'DB_USER_PLACEHOLDER');
            define('DB_PASS', 'DB_PASS_PLACEHOLDER');
            define('DB_NAME', 'DB_NAME_PLACEHOLDER');
            PHPEOF

            # Substitute placeholders with GitHub Secrets for production.
            sed -i "s|DB_HOST_PLACEHOLDER|${{ secrets.SERVER_HOST }}|g" "$DEPLOY_DIR/DBfiles/app_config.php"
            sed -i "s|DB_USER_PLACEHOLDER|${{ secrets.SERVER_USER }}|g" "$DEPLOY_DIR/DBfiles/app_config.php"
            sed -i "s|DB_PASS_PLACEHOLDER|${{ secrets.SERVER_PASS }}|g" "$DEPLOY_DIR/DBfiles/app_config.php"
            sed -i "s|DB_NAME_PLACEHOLDER|${{ secrets.SERVER_DB_NAME }}|g" "$DEPLOY_DIR/DBfiles/app_config.php"

            echo "app_config.php written successfully."
            echo "Deployment complete."